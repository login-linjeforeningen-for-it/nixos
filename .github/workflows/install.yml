name: Install NixOS configuration

on:
  workflow_dispatch:
    inputs:
      host:
        description: 'IP of the target machine'
        required: true
      configuration:
        description: 'NixOS configuration to deploy'
        required: true

jobs:
  build:
    runs-on: "nixos"
    steps:
      - uses: actions/checkout@v6
      - name: Add ssh key to known hosts
        run: |
          ssh-keyscan ${{ github.event.inputs.host }} >> known_hosts
      - name: Set up SSH key
        run: |
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > id_ed25519
          chmod 600 id_ed25519
      - name: Install to VM
        run: |
          nix run github:nix-community/nixos-anywhere -- --flake .#${{ github.event.inputs.configuration }} --ssh-option UserKnownHostsFile=known_hosts -i id_ed25519 builder@${{ github.event.inputs.host }}
      - name: Clean up known hosts
        run: |
          ssh-keygen -R ${{ github.event.inputs.host }} -f ~/.ssh/known_hosts